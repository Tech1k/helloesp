name = "helloesp-relay"
main = "worker.js"
compatibility_date = "2026-04-08"
workers_dev = false
preview_urls = false

# set secret with: wrangler secret put WORKER_SECRET
#
# (optional) HMAC device auth, a second secret the ESP signs a challenge with:
#   wrangler secret put HMAC_SECRET  # must match device_key in config.txt
#
# (optional) email notifications via SMTP2GO (skip to disable):
# covers guestbook moderation alerts, dead-man switch, and backup failure / overdue alerts
#   wrangler secret put SMTP2GO_KEY    # your SMTP2GO api key
#   wrangler secret put NOTIFY_EMAIL   # where to send alerts
#   wrangler secret put NOTIFY_FROM    # "HelloESP <noreply@helloesp.com>" (optional)
#
# (optional) dead-man's-switch threshold; default 6 hours, accepts fractional hours
#   wrangler secret put DEADMAN_HOURS  # e.g. "12" or "0.5" for testing
#
# (optional) R2 backup bucket. If not bound, Worker falls back to emailing the bundle as an
# attachment. Create the bucket once before deploying:
#   wrangler r2 bucket create helloesp-backup
#
# (optional) X / Twitter auto-post for Chronicle entries. All 4 must be set or the
# post path silently skips. Use a dedicated app with read+write permission:
#   wrangler secret put X_API_KEY        # consumer key
#   wrangler secret put X_API_SECRET     # consumer secret
#   wrangler secret put X_ACCESS_TOKEN   # access token
#   wrangler secret put X_ACCESS_SECRET  # access token secret

routes = [
  { pattern = "helloesp.com", custom_domain = true }
]

[durable_objects]
bindings = [
  { name = "ESP_RELAY", class_name = "EspRelay" }
]

[[r2_buckets]]
binding = "BACKUP"
bucket_name = "helloesp-backup"

# Cloudflare Workers AI binding powers /guestbook/translate via the
# @cf/meta/m2m100-1.2b multilingual model. Free tier (~10k neurons/day) is
# sufficient for this workload; translations are cached per (id, targetLang)
# in DO storage so each unique pair costs one neuron at most.
[ai]
binding = "AI"

# Worker observability: tail logs and traces visible in the dashboard.
# head_sampling_rate=1 keeps 100% of traces; lower if traffic ever scales.
[observability]
enabled = true
head_sampling_rate = 1

[[migrations]]
tag = "v1"
new_sqlite_classes = ["EspRelay"]
